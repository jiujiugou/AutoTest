services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autotest_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: ${AUTOTEST_SQL_SA_PASSWORD:-AutoTest_Sql_2026!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -C -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: autotest_sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SQLSERVER_HOST: sqlserver
      SA_PASSWORD: ${AUTOTEST_SQL_SA_PASSWORD:-AutoTest_Sql_2026!}
      AUTOTEST_DB: AutoTestDb
      HANGFIRE_DB: HangfireDb
    volumes:
      - ./docker/sqlserver/init:/init:ro
    command: [ "/bin/bash", "/init/init-db.sh" ]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: autotest_redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: autotest_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotest_api
    ports:
      - "5033:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      App__EnableHttpsRedirection: "false"
      Database__Provider: SqlServer
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=AutoTestDb;User Id=sa;Password=${AUTOTEST_SQL_SA_PASSWORD:-AutoTest_Sql_2026!};TrustServerCertificate=True;Encrypt=False;
      ConnectionStrings__HangfireConnection: Server=sqlserver;Database=HangfireDb;User Id=sa;Password=${AUTOTEST_SQL_SA_PASSWORD:-AutoTest_Sql_2026!};TrustServerCertificate=True;Encrypt=False;
      Redis__ConnectionString: redis:6379
      Logging__EnableElasticsearch: "true"
      Logging__ElasticNodes: http://elasticsearch:9200
      Jwt__SigningKey: ${AUTOTEST_JWT_SIGNING_KEY:?AUTOTEST_JWT_SIGNING_KEY must be set}
      Jwt__Key: ${AUTOTEST_JWT_SIGNING_KEY:?AUTOTEST_JWT_SIGNING_KEY must be set}
      BootstrapAdmin__Username: ${AUTOTEST_ADMIN_USERNAME:-}
      BootstrapAdmin__Password: ${AUTOTEST_ADMIN_PASSWORD:-}
      AI__Endpoint: ${AUTOTEST_AI_ENDPOINT:-}
      AI__ApiKey: ${AUTOTEST_AI_API_KEY:-}
      AI__Model: ${AUTOTEST_AI_MODEL:-doubao-pro-32k}
      AI__Worker__PollIntervalMs: ${AUTOTEST_AI_POLL_INTERVAL:-1000}
      AI__Worker__BatchSize: ${AUTOTEST_AI_BATCH_SIZE:-10}
      AI__Worker__MaxConcurrency: ${AUTOTEST_AI_MAX_CONCURRENCY:-4}
      AI__Worker__MaxRetryCount: ${AUTOTEST_AI_MAX_RETRY:-3}
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./AutoTestWeb
      dockerfile: Dockerfile
    container_name: autotest_web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  sqlserver_data:
  redis_data:
  es_data:
